#
# /home/$USER/.config/mango/conf.d/rules.conf
#

# [Window Rules]
# Format:
# 	  windowrule = Parameter:Value, Parameter:Value, appid:Regex, title:Regex
windowrule=isfloating:1,isfullscreen:0,appid:com.interversehq.qView
windowrule=isfloating:1,,appid:com.interversehq.qView

# [Tag Rules]
# Format:
# 	  tagrule = id:Number, Parameter:Value
tagrule = id:1, layout_name:tile
tagrule = id:2, layout_name:tile
tagrule = id:3, layout_name:tile
tagrule = id:4, layout_name:tile
tagrule = id:5, layout_name:tile
tagrule = id:6, layout_name:tile
tagrule = id:7, layout_name:tile
tagrule = id:8, layout_name:tile
tagrule = id:9, layout_name:tile

# [Layer Rules]
# Format:
# 	  layerrule = layer_name:Regex, Parameter:Value
layerrule=layer_name:^vibepanel-.*-popover$,noshadow:1
layerrule=layer_name:vibepanel-osd,noanim:1,noblur:1,noshadow:1
layerrule=layer_name:vibepanel-quick-settings,noanim:1,noblur:1,noshadow:1
layerrule=layer_name:vibepanel-click-catcher,noblur:1,noshadow:1
